<div class="page-wrapper">
    <div class="interaction-wrapper">
        <div class="title-wrapper">
            <h1>Get in <span style="color: rgb(211, 0, 0);">Touch</span></h1>
            <p>For any inquiries we are always willing to talk.</p>
        </div>
        <form action="">
            <div class="form-wrapper">
                <input type="text" placeholder="Name">
                <input type="email" placeholder="Email">
                <input type= "tel" placeholder="Phone Number" pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}">
                <textarea placeholder="Message" name="message" id="form-textarea"></textarea>
                <button id="send-button">SEND</button>
            </div>
        </form>
        <div class="contact-wrapper">
            <div class="social-wrapper">
                <img class="socials-icon" src="phone.svg" alt="phone-icon">
                <div class="socials-text">
                    <span>PHONE</span>
                    <span>00 000 00 00</span>
                </div>
            </div>
            <div class="social-wrapper">
                <img class="socials-icon" src="mail.svg" alt="email-icon">
                <div class="socials-text">
                    <span>EMAIL</span>
                    <span>placeholder@email.com</span>
                </div>
            </div>
            <div class="social-wrapper">
                <img class="socials-icon" src="instagram-logo.svg" alt="instagram-icon">
                <div class="socials-text">
                    <span>INSTAGRAM</span>
                    <span>Placeholder</span>
                </div>
            </div>
        </div>
    </div>
    <div class="map-wrapper">
        <img id="map" src="/mapa-madrid.png" alt="">
    </div>
</div>
