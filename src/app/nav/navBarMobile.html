<div class="hamburger-dropdown">
  <img class="icon" (click)="openMobileDropdown()" src="/menu-hamburger.svg" alt="hamburger menu" />
  <div id="nav-dropdown">
    <button class="btn-dropdown" (click)="closeMobileDropdown()">X</button>
    <div class="links-dropdown">
      <a (click)="closeMobileDropdown()" routerLink="/products">Products</a>
      <a (click)="closeMobileDropdown()" routerLink="/contact">Contact</a>
      <a (click)="closeMobileDropdown()" routerLink="/about">About us</a>
    </div>
  </div>
</div>
<div (click)="closeMobileDropdown()" id="overlay"></div>
