<div class="reviews-container">
  <div class="reviews-head">
    <h2 id="reviews-title">Customer Top Picks</h2>
  </div>
  <div class="reviews-box">
    <ul class="reviews-list">
      <li class="reviews-item"><reviews-item [curReview]="currentReview" /></li>
      @if (!isMobile) {
      <li class="reviews-item"><reviews-item [curReview]="reviews[1]" /></li>
      }
    </ul>
  </div>
</div>
